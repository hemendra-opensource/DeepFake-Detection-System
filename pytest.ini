[pytest]
# Project root — pytest collects tests from here
testpaths = tests

# Minimum pytest version
minversion = 7.0

# Output settings
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header

# Custom markers (avoids PytestUnknownMarkWarning)
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks tests requiring a real model checkpoint
    unit: marks fast unit tests with no external dependencies

# Log capturing
log_cli = false
log_level = WARNING
